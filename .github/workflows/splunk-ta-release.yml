name: Splunk TA Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string
      dry-run:
        description: 'Dry run (do not create release artifacts)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: splunk-ta-release
  cancel-in-progress: false

defaults:
  run:
    working-directory: integrations/splunk-ta

jobs:
  build-and-package:
    name: Build and Package
    runs-on: ubuntu-latest
    # Only run for a manual dispatch or a release tagged specifically for the
    # Splunk TA (splunk-ta-vX.Y.Z). This repo is a monorepo whose other SDKs are
    # released with repo-wide vX.Y.Z tags via semantic-release; without this
    # guard those releases would rebuild and mis-version this add-on.
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'splunk-ta-v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install splunk-add-on-ucc-framework splunk-appinspect pytest pytest-cov pytest-mock responses requests

      - name: Run tests
        run: pytest tests/ -v

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            # Strip the splunk-ta-v / v tag prefix (TA release tags are splunk-ta-vX.Y.Z)
            VERSION="${VERSION#splunk-ta-v}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update version in files
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Update app.manifest (version + release date)
          jq --arg ver "$VERSION" --arg date "$(date -u +%Y-%m-%d)" \
            '.info.id.version = $ver | .info.releaseDate = $date' \
            app.manifest > app.manifest.tmp && mv app.manifest.tmp app.manifest

          # Update globalConfig.json
          jq --arg ver "$VERSION" '.meta.version = $ver' globalConfig.json > globalConfig.json.tmp && mv globalConfig.json.tmp globalConfig.json

          # Update app.conf
          sed -i "s/^version = .*/version = $VERSION/" package/default/app.conf

      - name: Build TA package
        # Pin the version explicitly so the built artifact matches the release
        # version exactly, rather than ucc-gen re-deriving it from git describe
        # (which would re-introduce repo-wide tags and +<sha> build metadata).
        run: ucc-gen build --source package --ta-version "${{ steps.version.outputs.version }}"

      - name: Declare python.required (Splunk Enterprise 10.2+)
        # ucc-gen emits the deprecated python.version; add python.required to the
        # generated inputs.conf/restmap.conf so AppInspect's cloud profile passes.
        run: python3 "${{ github.workspace }}/scripts/inject-python-required.py" output/TA-darkstrata

      - name: Run AppInspect validation
        run: |
          cd output
          splunk-appinspect inspect TA-darkstrata \
            --mode precert \
            --included-tags cloud \
            --output-file appinspect-results.json

      - name: Check AppInspect results
        run: python3 ${{ github.workspace }}/scripts/check-appinspect.py output/appinspect-results.json

      - name: Create tarball
        if: ${{ !inputs.dry-run }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd output
          tar -czvf "TA-darkstrata-${VERSION}.tar.gz" TA-darkstrata

          # Calculate checksums
          sha256sum "TA-darkstrata-${VERSION}.tar.gz" > "TA-darkstrata-${VERSION}.tar.gz.sha256"

      - name: Upload release artifact
        if: ${{ !inputs.dry-run }}
        uses: actions/upload-artifact@v4
        with:
          name: TA-darkstrata-${{ steps.version.outputs.version }}
          path: |
            integrations/splunk-ta/output/TA-darkstrata-*.tar.gz
            integrations/splunk-ta/output/TA-darkstrata-*.tar.gz.sha256
            integrations/splunk-ta/output/appinspect-results.json
          retention-days: 90

      - name: Attach to GitHub Release
        if: github.event_name == 'release' && !inputs.dry-run
        uses: softprops/action-gh-release@v1
        with:
          files: |
            integrations/splunk-ta/output/TA-darkstrata-*.tar.gz
            integrations/splunk-ta/output/TA-darkstrata-*.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [build-and-package]
    if: github.event_name == 'release'
    steps:
      - name: Post release notes
        run: |
          echo "📦 Splunk TA Release ${{ github.event.release.tag_name }} complete!"
          echo ""
          echo "Download the package from the GitHub Release page."
          echo ""
          echo "Note: Splunkbase submission requires manual upload."
          echo "Visit https://splunkbase.splunk.com/app/submit to upload the .tar.gz package."
